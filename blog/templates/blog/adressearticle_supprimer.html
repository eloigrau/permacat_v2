{% extends 'blog/base_blog2.html' %}
{% block title %}Enlever un lieu d'un article |{% endblock %}
{% block subtitle %}
<h3>Enlever un lieu de l'article</h3>
{% endblock %}
{% block content %}
<form action="" method="post">{% csrf_token %}
    <p>Etes vous sûr.e de vouloir enlever le lieu "{{ adressearticle }}"?</p>
    <input type="button"  onclick="window.history.back();"  value="Annuler" />
    <input type="submit" value="Confirmer" />
</form>
{% endblock %}
