{% extends 'compta/base_compta.html' %}

{% block title %}Modifier une opération |{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-10 col-md-6 ">
                <h4 class="textcenter">Modifier l'opération</h4>
        {% include 'form_template.html'%}
    </div>
</div>
{% endblock %}

{% block script %}
<script>
function updateForm() {
    var type_transaction = $("#id_type_transaction").val(); // get the selected country ID from the HTML input
    if (type_transaction){
        var select_transaction = document.getElementById("id_budget_destination").parentElement;

        if (type_transaction == "TRANSFERT") {
            select_transaction.style.display = 'inline';
             select_transaction.style.visibility = "visible";
        }else{
            select_transaction.style.display = 'none';
            select_transaction.style.visibility = "hidden";
        };
    }
};


$(document).ready(function() {
    updateForm();
    $("#id_type_transaction").change(updateForm);
});
</script>
{% endblock %}
