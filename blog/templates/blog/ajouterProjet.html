{% extends 'base_projets.html' %}

{% block subtitle %}
<h3>Proposer un projet</h3>
{% endblock %}
{% block content %}
{% if error_message %}
<p>
	<strong>{{ error_message }}</strong>
</p>
{% endif %}
<div class="row">
	<div class="col-sm-12">
<form class="form-horizontal" role="form" action="" method="post"
	enctype="multipart/form-data">
	{% csrf_token %} <input type="hidden" name="Projet"
		value="{{ projet }}"> {% include 'form_template.html'%}
</form>

</div>
    </div>


<script>
    $(function() {
    // Enable on all forms
    $('form').areYouSure();
    });
</script>
{% endblock %}
