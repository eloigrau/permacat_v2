{% extends 'layout/layout_blank.html' %}
{% load static %}
{% load i18n %}
{% load fontawesome_5 %}
{% load cookielaw_tags %}
{% block header %}
<script src="{% static 'js/cookielaw.js'%}" type="text/javascript"></script>
{% endblock%}

{% block content %}
<div class="row">
    <div class="col-sm-12 my-auto">
        <div class="row textcenter">
            <div class="col">
                <a href="{% url 'gallerie' %}"><img alt="gallerie" class="imgbienvenue"
                                                    src="{{STATIC_URL}}{{nomImage}}"></a>
            </div>
        </div>
        <hr>
        <div class="row-sm-12 justify-content-center">
            <div class="col-sm-12 textcenter">
                <button class="btn btn-lg btn-primary" type="button"><a href="{% url 'presentation_site_pkoi'  %}">
                    Pourquoi s'inscrire sur Perma.Cat ?</a></button>
            </div>
        </div>
        <hr>
        <div class="row">
            <div class="col-sm-12 textcenter">
                <b> <a class="btn btn-light btn-radius" href="{% url 'login' %}"> <i class="fa fa-user"></i> Se
                    connecter</a>

                </b>
            </div>
        </div>
        <hr>
        <div class="row">
            <div class="col-sm-12 textcenter">
                <b> <a class="btn btn-light btn-radius" href="{% url 'senregistrer' %}"> <i class="fa fa-user"></i>
                    S'inscrire sur le site</a>

                </b>
            </div>
        </div>
        <hr>
        <div class="row">
            <div class="col-sm-12 textcenter">
                <b> <a class="btn btn-light btn-radius" href="{% url 'contact_admins' %}"><i
                        class='fa fa-envelope iconleft '></i> Nous contacter</a>
                </b>
            </div>
        </div>

    </div>
</div>


{% endblock %}
