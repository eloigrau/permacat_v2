{% extends 'base_projets.html' %}
{% block title %}Supprimer le projet |{% endblock %}
{% block content %}
<div class="row ">
<div class="col-sm-12 textcenter">
<form action="" method="post">{% csrf_token %}
    <p>Etes vous sûr.e de vouloir supprimer le projet de "{{ projet.titre }}"?</p>
    <input type="button"  onclick="window.history.back();"  value="Annuler" />
    <input type="submit" value="Confirmer" />
</form>
</div>
</div>

{% endblock %}
