{% extends 'compta/base_compta.html' %}

{% block title %}Ajouter une opération{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-10 col-md-6">
                <h2 class="h5 mb-4"><i class="bi bi-plus-circle me-2"></i>Enregistrer une opération</h2>

                <form id="articleForm" class="form-horizontal" role="form" action="" method="post"
                    enctype="multipart/form-data" >
                    {% csrf_token %} {% include 'form_template.html'%}
                </form>
    </div>
</div>
{% endblock %}

{% block script %}
<script>
function updateForm() {
    var type_transaction = $("#id_type_transaction").val(); // get the selected country ID from the HTML input
    if (type_transaction){
        var select_transaction = document.getElementById("id_projet_destination").parentElement;

        if (type_transaction == "TRANSFERT") {
            select_transaction.style.display = 'inline';
             select_transaction.style.visibility = "visible";
        }else{
            select_transaction.style.display = 'none';
            select_transaction.style.visibility = "hidden";
        };
    }
};


$(document).ready(function() {
    updateForm();
    $("#id_type_transaction").change(updateForm);
});
</script>
{% endblock %}
