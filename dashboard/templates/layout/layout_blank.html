{% extends 'layout/master.html' %}
{% load static %}

{% block page_css %}
        <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}" type='text/css'/>
        <link href="{% static 'css/style.css' %}" type="text/css" rel="stylesheet" />
{% endblock page_css %}

{% block layout %}

      <!-- Content wrapper: Start -->
      <div class="content-wrapper">
        <!-- Content: Start -->
          <div class="container-fluid flex-grow-1 container-p-y">
            <div class="row rowprincipal justify-content-center">
                <div class="col-sm-12 colprincipal">
                {% block intro %}
                {% endblock intro %}
                {% block content %}
                {% endblock content %}
              </div>
            </div>
          </div>
      </div>
<!-- Content: End -->

{% endblock layout %}
>
{% block footer %}
<footer class="footer bg-footer-theme">
  <div class="container-fluid">
    <div class="align-items-center justify-content-center ">
    <p class="textcenter">
    <a href="#top" id="scroll-to-top" class="btn"><i class="fa fa-angle-up"></i></a></p>
    <p class="textcenter textepetit">&copy; PermaCat; {% now 'd/m/Y' %}</p>
    </div>
  </div>
</footer>
{% endblock footer %}
